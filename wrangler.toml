# ═══════════════════════════════════════════════════════
# Masjid Community App — Wrangler Configuration
# ═══════════════════════════════════════════════════════
name       = "masjid-app"
main       = "src/worker.js"
# Use "pages" if deploying to Cloudflare Pages
# (wrangler pages deploy public/)

compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Static Assets ────────────────────────────────────
# Serves the SPA from the public/ directory
[site]
bucket = "./public"

# ─── D1 Database ──────────────────────────────────────
[[d1_databases]]
binding      = "DB"          # env.DB in Worker code
database_name = "mosquesdb"
database_id  = "YOUR_DATABASE_ID_HERE"   # Replace after: wrangler d1 create mosquesdb

# ─── Environment Variables ────────────────────────────
[vars]
ENVIRONMENT = "production"

# ─── Dev (local) overrides ────────────────────────────
[env.dev]
name = "masjid-app-dev"

[[env.dev.d1_databases]]
binding       = "DB"
database_name = "mosquesdb-dev"
database_id   = "YOUR_DEV_DATABASE_ID_HERE"

[env.dev.vars]
ENVIRONMENT = "development"
